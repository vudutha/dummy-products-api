name: Build & Deploy to CloudHub 2.0

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Maven cache ───────────────────────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # ── 4. Write ~/.m2/settings.xml ──────────────────────────────────────
      #   Credentials for:
      #     • Anypoint Exchange v3  — Connected App (artifact downloads)
      #     • mulesoft-releases     — Connected App
      #     • mulesoft-snapshots    — Connected App
      #     • mule-ee-releases      — Connected App (mule-service-http / EE XSD)
      #     • mule-ee-snapshots     — Connected App
      #     • libs-releases         — Connected App
      #     • mule (public)         — Connected App
      - name: Configure Maven settings.xml
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: |
            [
              {
                "id": "anypoint-exchange-v3",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mulesoft-releases",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mulesoft-snapshots",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mule-ee-releases",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mule-ee-snapshots",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "libs-releases",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              },
              {
                "id": "mule",
                "username": "~~~Client~~~",
                "password": "${{ secrets.ANYPOINT_CLIENT_ID }}~?~${{ secrets.ANYPOINT_CLIENT_SECRET }}"
              }
            ]

      # ── 5. Build & Deploy ─────────────────────────────────────────────────
      - name: Build & Deploy to CloudHub 2.0
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: |
          mvn clean deploy -DskipTests -B \
            -Dmule.maven.plugin.skipValidation=true \
            -DSKIP_AST=true \
            -DSKIP_AST_VALIDATION=true \
            -DlightweightPackage=true \
            -Danypoint.client_id="${ANYPOINT_CLIENT_ID}" \
            -Danypoint.client_secret="${ANYPOINT_CLIENT_SECRET}" \
            -Dcloudhub.environment="${{ vars.CLOUDHUB_ENV || 'Sandbox' }}" \
            -Dcloudhub.businessGroup="${{ vars.CLOUDHUB_BUSINESS_GROUP || '' }}" \
            -Dcloudhub.target="${{ vars.CLOUDHUB_TARGET || 'Sandbox' }}"
